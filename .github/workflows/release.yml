name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows Installers
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: CS2 Config Backup v__VERSION__
          releaseBody: |
            ## CS2 Config Backup v__VERSION__

            Windows 安装包已由 GitHub Actions 自动构建并上传。

            - `CS2 Config Backup_*_x64-setup.exe` — NSIS 安装包，推荐普通用户使用
            - `CS2 Config Backup_*_x64_zh-CN.msi` — 中文 WiX 安装包，适合企业或批量部署

            ### 本次更新

            - Auto.cfg 可视化编辑器：按分组可视化编辑鼠标、准星、键位、音量等设置
            - 自动更新检测：启动时通过 GitHub Releases API 检测最新版本，CDN 加速下载，静默重启安装
            - 设置页版本信息与手动检测更新按钮
            - GitHub 更新请求统一使用 CDN 加速
            - 修复编辑器保存并关闭 bug、提取共享组件、仪表盘总大小统计

            完整更新日志见 CHANGELOG.md。
          releaseDraft: false
          prerelease: false
          args: --bundles nsis,msi
